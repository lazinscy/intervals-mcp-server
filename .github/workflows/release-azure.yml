name: Release to Azure Artifacts

on:
  push:
    branches:
      - generic-mcp-satellite
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    uses: lazinscy/org-standards/.github/workflows/reusable-semantic-release.yml@main
    with:
      publish: true
      publish_azure: true
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      AZURE_ARTIFACTS_PAT: ${{ secrets.AZURE_ARTIFACTS_PAT }}
